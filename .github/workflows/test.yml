name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.29.0'

jobs:
  # ─── Dart / Flutter unit + integration tests ─────────────────────────────
  dart-tests:
    name: Dart tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # mozjpeg requires nasm for its assembly routines
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Build Linux native library
        working-directory: rust
        run: cargo build --release

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Run unit tests
        run: flutter test test/ironpress_test.dart test/options_test.dart

      - name: Run integration tests (with native library)
        run: flutter test test/integration_test.dart
        env:
          # Make the compiled .so discoverable by DynamicLibrary.open()
          LD_LIBRARY_PATH: ${{ github.workspace }}/rust/target/release

  # ─── Rust tests ──────────────────────────────────────────────────────────
  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Run Rust tests
        working-directory: rust
        run: cargo test

      - name: Check Rust formatting
        working-directory: rust
        run: cargo fmt --check

      - name: Clippy lint
        working-directory: rust
        run: cargo clippy -- -D warnings

      - name: Install cargo-audit
        working-directory: rust
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        working-directory: rust
        run: cargo audit

  # ─── Pub publish dry-run ─────────────────────────────────────────────────
  windows-desktop-smoke:
    name: Desktop smoke (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Smoke test bundled Windows library
        run: flutter test test/integration_test.dart --plain-name "produces non-empty output with valid stats"

  macos-desktop-smoke:
    name: Desktop smoke (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Smoke test bundled macOS library
        run: flutter test test/integration_test.dart --plain-name "produces non-empty output with valid stats"

  publish-check:
    name: pub publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Dry-run publish
        run: flutter pub publish --dry-run
