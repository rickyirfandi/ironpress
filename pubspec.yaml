name: ironpress
description: >
  High-performance Rust-powered Flutter image compression for JPEG, PNG,
  and WebP with batch processing, target-size compression, and metadata
  probing.
version: 0.2.0
homepage: https://github.com/rickyirfandi/ironpress
repository: https://github.com/rickyirfandi/ironpress
issue_tracker: https://github.com/rickyirfandi/ironpress/issues
topics:
  - image-compression
  - image-processing
  - jpeg
  - png
  - webp

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

dependencies:
  ffi: ^2.2.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Platform support is gated by precompiled native binaries.
# Only platforms with binaries in the package will work.
flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
